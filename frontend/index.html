<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TractionPal — Content Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg: #080808;
            --color-surface: #121212;
            --color-border: rgba(255, 255, 255, 0.08);
            --color-text-primary: #FFFFFF;
            --color-text-secondary: #8A8A8E;
            --color-accent: #5E6AD2;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--color-bg);
            color: var(--color-text-primary);
            -webkit-font-smoothing: antialiased;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Subtle Linear-style top glow */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100vw;
            height: 600px;
            background: radial-gradient(50% 100% at 50% 0%, rgba(94, 106, 210, 0.08) 0%, rgba(8, 8, 8, 0) 100%);
            pointer-events: none;
            z-index: -1;
        }

        .linear-card {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid var(--color-border);
            border-radius: 12px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .hero-heading {
            font-size: clamp(2.5rem, 8vw, 5.5rem);
            line-height: 1;
            letter-spacing: -0.05em;
            font-weight: 700;
            background: linear-gradient(180deg, #FFFFFF 0%, rgba(255, 255, 255, 0.5) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .linear-input {
            background: rgba(255, 255, 255, 0.03) !important;
            border: 1px solid var(--color-border) !important;
            border-radius: 8px !important;
            color: white !important;
            font-size: 14px !important;
            padding: 12px 16px !important;
            transition: border-color 0.2s ease, box-shadow 0.2s ease !important;
        }

        .linear-input:focus {
            outline: none !important;
            border-color: rgba(255, 255, 255, 0.2) !important;
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.05) !important;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .tracking-tight-linear {
            letter-spacing: -0.02em;
        }

        .sidebar-item-linear {
            transition: all 0.2s ease;
            color: var(--color-text-secondary);
        }
        .sidebar-item-linear:hover {
            color: white;
            background: rgba(255, 255, 255, 0.05);
        }
        .sidebar-item-linear.active {
            color: white;
            background: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
</body>
</html>
